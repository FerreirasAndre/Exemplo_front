<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
     <link rel="stylesheet" href="../style/cadastro_style.css">
</head>
<body>
    <h1>Horizonte Blues</h1>

<header>
<nav>
    <ul>
        <li><a href="./login.html">Início</a></li>
    </ul>
</nav>

<main>
    <section>
        <h2>Criar nova conta</h2>
        <form id ="CadastroForm">
            <label for="cadNome">Nome</label>
            <input type="text" id="cadNome" required>

            <label for="cadEmail">E-mail</label>
            <input type="email" id="cadEmail" required>

            <label for="cadCep">CEP</label>
            <input type="text" maxlength="8" id= "cadCep" required>

            <label for="cadRua">Rua</label>
            <input type="text" id="cadRua" required>

            <label for="cadBairro">Bairro</label>
            <input type="text" id="cadBairro" required>

            <label for="cadcidade">Cidade</label>
            <input type="text" id="cadcidade" required>

            <label for="cadEstado">Estado</label>
            <input type="text" id="cadEstado" required>

            <label for="cadSenha">Senha</label> 
            <input type="text" id="cadSenha" required>

        </form>
    </section>
</main>
</header>
    <script src="./script.js"></script>
</body>
</html>
